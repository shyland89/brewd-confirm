<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brewd — You're confirmed</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0f0e0d;
      color: #f0ebe4;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .mark {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 2rem;
      color: #c9a97a;
      letter-spacing: -0.5px;
      margin-bottom: 3rem;
    }

    .card {
      background: #1a1815;
      border: 1px solid #2e2b26;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }

    .icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #2a2218;
      border: 1px solid #3d3020;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    .icon svg {
      width: 22px;
      height: 22px;
      stroke: #c9a97a;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 400;
      color: #f0ebe4;
      margin-bottom: 0.75rem;
      letter-spacing: -0.3px;
    }

    p {
      font-size: 0.95rem;
      color: #8a8077;
      line-height: 1.65;
    }

    .divider {
      border: none;
      border-top: 1px solid #2e2b26;
      margin: 2rem 0;
    }

    .hint {
      font-size: 0.8rem;
      color: #5a5450;
    }
  </style>
</head>
<body>

  <div class="mark">brewd</div>

  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>

    <h1>You're confirmed.</h1>
    <p>Your account is verified. Open the Brewd app to start logging your beans.</p>

    <hr class="divider" />

    <p class="hint">If you didn't sign up for Brewd, you can safely ignore this page.</p>
  </div>

</body>
</html>
